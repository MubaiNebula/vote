<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>答题闯关</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, system-ui, sans-serif; background: #f5f7fb; display: flex; justify-content: center; align-items: center; min-height: 100vh; padding: 16px; }
        .card { background: white; border-radius: 24px; padding: 32px 24px; max-width: 420px; width: 100%; box-shadow: 0 10px 30px rgba(0,0,0,0.06); }
        .question { font-size: 22px; font-weight: 700; margin-bottom: 24px; color: #1a1a2e; }
        .options { display: flex; flex-direction: column; gap: 12px; }
        .option {
            background: #f0f2f5; border: 2px solid transparent; border-radius: 16px; padding: 14px 18px;
            font-size: 17px; cursor: pointer; transition: all 0.2s; text-align: left;
            -webkit-tap-highlight-color: transparent;
        }
        .option.correct { background: #d4edda; border-color: #28a745; color: #155724; font-weight: 600; }
        .option.wrong { background: #f8d7da; border-color: #dc3545; color: #721c24; }
        .option.disabled { pointer-events: none; opacity: 0.85; }
        .feedback { margin-top: 20px; font-size: 16px; font-weight: 600; min-height: 24px; }
        .score-box { text-align: center; }
        .score-box h2 { font-size: 36px; margin-bottom: 12px; }
        .btn { background: #0d6efd; color: white; border: none; padding: 12px 28px; border-radius: 30px; font-size: 17px; font-weight: 600; margin-top: 20px; cursor: pointer; width: 100%; }
        .progress { font-size: 14px; color: #6c757d; margin-bottom: 16px; }
    </style>
</head>
<body>
<div id="app" class="card"></div>

<script>
  // ========== 在这里修改你的题目 ==========
  const quizData = [
    { question: "地球上最大的海洋是？", options: ["大西洋", "印度洋", "太平洋", "北冰洋"], correct: 2 },
    { question: "JavaScript 中，typeof null 的结果是？", options: ["null", "undefined", "object", "boolean"], correct: 2 },
    { question: "以下哪个不是 CSS 预处理器？", options: ["Sass", "Less", "Stylus", "Babel"], correct: 3 },
    { question: "React 中用来管理状态的是？", options: ["props", "state", "ref", "context"], correct: 1 },
    { question: "HTTP 状态码 404 表示？", options: ["服务器错误", "未授权", "未找到", "重定向"], correct: 2 }
  ];
  // ========================================

  const app = document.getElementById('app');
  let current = 0, score = 0, answered = false, timer = null;

  function renderQuestion() {
    if (current >= quizData.length) {
      showResult();
      return;
    }
    answered = false;
    const q = quizData[current];
    let html = `<div class="progress">第 ${current+1}/${quizData.length} 题</div>`;
    html += `<div class="question">${q.question}</div><div class="options">`;
    q.options.forEach((opt, i) => {
      html += `<div class="option" data-index="${i}">${opt}</div>`;
    });
    html += `</div><div class="feedback" id="feedback"></div>`;
    app.innerHTML = html;

    document.querySelectorAll('.option').forEach(el => {
      el.addEventListener('click', handleOptionClick);
    });
  }

  function handleOptionClick(e) {
    if (answered) return;
    answered = true;
    clearTimeout(timer);
    const q = quizData[current];
    const selected = parseInt(e.target.dataset.index);
    const optionsEls = document.querySelectorAll('.option');
    // 高亮正确答案
    optionsEls.forEach((el, i) => {
      el.classList.add('disabled');
      if (i === q.correct) el.classList.add('correct');
    });
    const fb = document.getElementById('feedback');
    if (selected === q.correct) {
      score++;
      fb.textContent = '✅ 回答正确！';
      fb.style.color = '#28a745';
    } else {
      e.target.classList.add('wrong');
      fb.textContent = '❌ 回答错误';
      fb.style.color = '#dc3545';
    }
    // 2秒后自动下一题
    timer = setTimeout(() => {
      current++;
      renderQuestion();
    }, 2000);
  }

  function showResult() {
    const total = quizData.length;
    let emoji = '';
    if (score === total) emoji = '🎉';
    else if (score >= total/2) emoji = '👍';
    else emoji = '💪';
    app.innerHTML = `
      <div class="score-box">
        <h2>${emoji}</h2>
        <p style="font-size:24px;font-weight:700;">你的得分</p>
        <p style="font-size:48px;font-weight:800;color:#0d6efd;">${score}/${total}</p>
        <button class="btn" onclick="restart()">再来一次</button>
      </div>
    `;
  }

  window.restart = function() {
    current = 0; score = 0; answered = false;
    clearTimeout(timer);
    renderQuestion();
  };

  renderQuestion();
</script>
</body>
</html>
